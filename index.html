<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millennium Lurker's Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen p-4">
    <div class="main-container bg-gray-900 p-8 rounded-2xl shadow-2xl max-w-4xl w-full flex flex-col md:flex-row items-center justify-center space-y-8 md:space-y-0 md:space-x-12 border border-gray-800">
        <div class="profile-image-container flex-shrink-0">
            <img src="sara_leite.jpg" alt="Foto de Perfil"
                 class="rounded-full w-48 h-48 object-cover border-4 border-cyan-500 shadow-lg transition-transform duration-300 hover:scale-105">
        </div>

        <div class="content-section text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-extrabold text-cyan-400 mb-4 animate-fade-in">
                ¡Hola! Soy <span class="text-white">Sara Leite.</span>
            </h1>
            
            <p class="text-lg md:text-xl text-gray-300 mb-6 leading-relaxed animate-fade-in-delay-1">
                Estudiante de ASIR | Diseñadora Web en formación | Ilustradora con experiencia freelance | UX/UI y Sistemas.
            </p>
            
            <p class="text-md md:text-lg text-gray-400 mb-8 animate-fade-in-delay-2">
                Conectemos:
            </p>
            
            <div class="social-links flex flex-col sm:flex-row justify-center md:justify-start items-center space-y-4 sm:space-y-0 sm:space-x-6 animate-fade-in-delay-3">
                <a href="https://www.linkedin.com/in/saraleite-ml/" target="_blank" rel="noopener noreferrer"
                   class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 ease-in-out transform hover:scale-105 shadow-md hover:shadow-lg">
                    LinkedIn
                </a>
                <a href="https://github.com/millenniumlurker" target="_blank" rel="noopener noreferrer"
                   class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 ease-in-out transform hover:scale-105 shadow-md hover:shadow-lg">
                    GitHub
                </a>
            </div>
            <!-- Mensaje de agradecimiento -->
            <p class="text-sm text-gray-500 mt-10 animate-fade-in-delay-4">
                Gracias por tu interés. ¡Pronto habrá más!
            </p>
        </div>
    </div>
</body>
</html>
